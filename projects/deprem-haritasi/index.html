<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Canlı Deprem Haritası — Hıdır Kılıç</title>
    <meta name="description" content="Türkiye'deki güncel deprem verilerini gerçek zamanlı olarak harita üzerinde gösteren interaktif uygulama.">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="demo-banner">
        🟢 Canlı veri — <a href="https://github.com/hdrklc/Anlik-Deprem-Haritasi" target="_blank" rel="noopener">kaynak kod</a>
        <span class="banner-extra">· veri kaynağı: Kandilli Rasathanesi (public API üzerinden)</span> ·
        <a href="../../index.html#projects" id="backLink">← Portföye dön</a>
    </div>
    <script>
        if (window.self !== window.top) {
            const back = document.getElementById('backLink');
            back.textContent = '✕ Kapat';
            back.href = '#';
            back.addEventListener('click', (e) => {
                e.preventDefault();
                window.parent.postMessage('close-demo-modal', '*');
            });
        }
    </script>
    <div class="container-fluid">
        <div class="row">
            <!-- Filtre Paneli -->
            <div class="col-md-3 filter-panel">
                <div class="card">
                    <div class="card-header">
                        <h5>Filtreler</h5>
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label class="form-label">Büyüklük Aralığı</label>
                            <div class="d-flex align-items-center">
                                <input type="number" class="form-control" id="magMin" min="0" max="10" step="0.1" placeholder="Min">
                                <span class="mx-2">-</span>
                                <input type="number" class="form-control" id="magMax" min="0" max="10" step="0.1" placeholder="Max">
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Derinlik (km)</label>
                            <select class="form-select" id="depth">
                                <option value="">Tümü</option>
                                <option value="shallow">Yüzeysel (0-30 km)</option>
                                <option value="medium">Orta (31-60 km)</option>
                                <option value="deep">Derin (60+ km)</option>
                            </select>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Tarih Aralığı</label>
                            <input type="text" class="form-control" id="dateRange">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Bölge</label>
                            <input type="text" class="form-control" id="region" placeholder="İl/İlçe ara...">
                        </div>
                        <button class="btn btn-primary w-100" id="applyFilters">Filtreleri Uygula</button>
                    </div>
                </div>

                <!-- İstatistik Kartları -->
                <div class="stats-cards mt-3">
                    <div class="card mb-2">
                        <div class="card-body">
                            <h6 class="card-subtitle mb-2 text-muted">Son 24 Saat</h6>
                            <h3 class="card-title" id="last24HourCount">0</h3>
                            <p class="card-text">deprem</p>
                        </div>
                    </div>
                    <div class="card mb-2">
                        <div class="card-body">
                            <h6 class="card-subtitle mb-2 text-muted">En Büyük Deprem</h6>
                            <h3 class="card-title" id="maxMagnitude">0.0</h3>
                            <p class="card-text" id="maxMagnitudeLocation">-</p>
                        </div>
                    </div>
                </div>

                <!-- Grafik Alanı -->
                <div class="card mt-3">
                    <div class="card-header">
                        <h5>Deprem İstatistikleri</h5>
                    </div>
                    <div class="card-body">
                        <canvas id="magnitudeChart"></canvas>
                        <canvas id="depthChart" class="mt-3"></canvas>
                    </div>
                </div>
            </div>

            <!-- Harita ve Deprem Listesi -->
            <div class="col-md-9">
                <div class="map-container">
                    <div id="map"></div>
                    <div id="info-panel">
                        <h2>Son Depremler</h2>
                        <div id="earthquake-list"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Deprem Detay Modal -->
    <div class="modal fade" id="earthquakeModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Deprem Detayları</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="row">
                        <div class="col-md-6">
                            <h6>Bölge Geçmişi</h6>
                            <div id="historyChart"></div>
                        </div>
                        <div class="col-md-6">
                            <h6>Detaylı Bilgi</h6>
                            <div id="earthquakeDetails"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
    <script src="https://cdn.jsdelivr.net/npm/flatpickr/dist/l10n/tr.js"></script>
    <script src="app.js"></script>
</body>
</html>
